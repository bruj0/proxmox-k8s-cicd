# WP07 T000 — version compatibility matrix for the Agent Skill.
# Records the agentskills.io spec version this SKILL.md conforms to,
# the consumers that have been verified to parse it, and the
# cross_check verdict against the actual pipeline CLI surface.
dependencies:
  - name: agentskills.io
    version: "v1 (current stable)"
    rationale: "v1 is the stable open standard as of 2026-07. YAML frontmatter schema is `name` + `description`; body is markdown."
    consumers_tested:
      - "claude-code"
      - "cursor"
    source: "context7-auto-research on 2026-07-05"

  - name: context7-auto-research
    version: "latest"
    rationale: "The skill's Step 0 requires the agent to load .agents/skills/context7-auto-research/SKILL.md before invoking any external library. The exact version of the context7-auto-research skill itself is not pinned because it is local project content, not an external library."
    source: "local"

# Live-host evidence collected during WP00 deploy (2026-07-06).
# These are real Proxmox + Cloudflare API endpoints that the
# tokens module calls, recorded so future operators / agents can
# verify before re-applying.
live_host_evidence:
  proxmox:
    host: "kvm.bruj0.net:8006"
    pve_version: "9.2.3"
    kernel: "7.0.6-2-pve"
    node_name: "BigBertha"
    sdn_zones:
      - "intranet (zone, attached to vnet0)"
    storage:
      - "data1 (lvmthin)"
      - "data2 (lvmthin)"
      - "local (dir)"
    vnet0_subnet: "10.0.0.1/8"
    # Token creation requires Sys.Modify; PVEAdmin does NOT have it.
    # Only Administrator role has it. Pragmatic answer: use a
    # root@pam!tf-bootstrap token for WP00, delete after.
    role_creation_min_priv: "Sys.Modify (Administrator)"
  cloudflare:
    account_id: "2e9c09b27d2a089c531b12ae0f0e6ff3"
    zone_id: "15e4cfe0ecfee91903601ae780932ad3"
    zone_name: "bruj0.net"
    # Verified 2026-07-06: stable permission-group UUIDs.
    # The provider's data source hits /token/permission_groups
    # (singular) but the real endpoint is /tokens/permission_groups
    # (plural). With cfat_* admin tokens the data source returns
    # empty; use these fallbacks.
    permission_group_uuids:
      "Zone Read":                   "c8fed203ed3043cba015a93ad1616f1f"
      "DNS Write":                   "4755a26eedb94da69e1066d98aa820be"
      "Cloudflare Tunnel Write":     "c07321b023e944ff818fec44d8203567"
    # Resource key format that Cloudflare's API accepts.
    # account.id (the API response field) is NOT a valid resource key.
    resource_keys:
      zone_scoped:    "com.cloudflare.api.account.zone.<zone_id>"
      account_scoped: "com.cloudflare.api.account.<account_id>"
    # Auth: cfat_* tokens cannot mint child tokens; user-level auth
    # (X-Auth-Email + X-Auth-Key) is required for POST /user/tokens.
    auth_required: "global_api_key + email (NOT cfat_* for child token mint)"

cross_check:
  skill_schema_both_consumers: "compatible -- claude-code and cursor both parse the YAML frontmatter and load the body without warnings (verified manually on 2026-07-05)"
  pipeline_instructions_match_actual_cli: "verified -- every Phase in the skill (make build-image, tofu apply, talosctl apply-config, helm upgrade, kubectl apply, nft list chain) corresponds to a CLI entry point that exists in this repository as of WP00-WP06"
  wp00_apply_against_live_host: "verified 2026-07-06 -- scripts/apply.sh against kvm.bruj0.net minted proxmox k3s-cluster role (12 privs from spec T005) and Cloudflare scoped token (Zone Read + DNS Write + Cloudflare Tunnel Write). output.json written (mode 0600). tokens test 6/6 pass."
  preflight_added_to_skill: "verified 2026-07-06 -- Step 0a (8 sub-probes) and Step 0b (7 apply-time gotchas) added to SKILL.md after the live deploy surfaced each as a hard blocker"
  phase1_apply_against_live_host: "verified 2026-07-06 -- Phase 1 (build Talos template at VMID 900) completed. talos-base at VMID 999 created on data1 with Talos v1.10.0 ISO. Packer's proxmox-clone v1.2.x couldn't reach SSH-wait (Talos installer has no SSH) so Packer was bypassed; direct PVE API clone + template conversion succeeded. build/image-id.txt = 900. /etc/pve/qemu-server/900.conf has `template: 1`."
  phase1_k3s_role_privs: "verified 2026-07-06 -- The 12-priv spec T005 role was insufficient for Phase 1; extended to 19 privs (added Sys.Audit, VM.Audit, VM.Clone, VM.Migrate, VM.Config.CDROM, VM.Config.HWType, VM.Snapshot.Rollback). Applied via scripts/apply.sh and verified via pvesh get /access/roles/k3s-cluster."
  phase1_output_json_split: "verified 2026-07-06 -- bpg/proxmox v0.111.x's proxmox_user_token.<>.value returns the FULL api-token string (USER@REALM!TOKENID=secret). output_json.tf now splits the value on '=' inside a locals {} block so proxmox_token_secret is the bare 36-char UUID. PVEAuth header built downstream as `<id>=<secret>`."
  phase1_packer_schema: "verified 2026-07-06 -- talos.pkr.hcl had to be patched against hashicorp/proxmox v1.2.3 schema: clone_from_vm_id -> clone_vm_id, vm_template_name -> template_name, formatdate(...) call dropped, storage_pool retargeted from local-lvm to data1, and `token = \"${id}=${secret}\"` simplified to `token = secret` (Packer adds the prefix itself)."
  phase1_packer_ssh_wait: "verified 2026-07-06 -- hashicorp/proxmox v1.2.x proxmox-clone always starts the cloned VM and blocks on SSH-wait (5m22s timeout in our run). Talos installer-mode has no SSH. Recommended workaround: skip Packer for this step, use direct `POST /nodes/<node>/qemu/999/clone` + `POST /nodes/<node>/qemu/900/template`."  phase2_apply_against_live_host: "verified 2026-07-06 -- Phase 2 applied successfully on BigBertha. cicd cluster: 5 resources added (2 hosts + 2 VMs + vip_reservation + traefik_chartconfig + cluster_output + 2 talos_machineconfig = 9 hcl-of-yore; net shown 5 after the early-apply showed inconsistent-result failure); cicd-cp-1 VMID 200, cicd-w-1 VMID 201 running. Apps cluster: 15 resources added; apps-cp-1 VMID 210, apps-w-1 VMID 211 running. Both output.json contracts expose cluster_name, vip, pod_cidr, svc_cidr, nodes[]. Six live-host fixes applied (Phase-2 lessons 2b.1 - 2b.7)."
  phase2_role_privs: "verified 2026-07-06 -- k3s-cluster role = 20 privs after Phase-2 extension. Pinned by infra/tokens/tests/main.tftest.hcl::proxmox_role_has_spec_t005_privileges (assert == 20). The 20th priv is Sys.Modify, required for proxmox_virtual_environment_hosts SDN writes (PVE 9.2.x rejects without it even when SDN.Use is present)."
  phase2_cf_api_token_contract: "verified 2026-07-06 -- output.json now contains cf_api_token (cloudflare scoped API token), cf_account_id (Cloudflare account ID), proxmox_token_id, proxmox_token_secret (bare UUID, 36 chars), pve_endpoint, cloudflare_zone_id. Legacy aliases (cloudflare_scoped_token, cloudflare_account_id) are also emitted for runbook backwards-compatibility. Pinned by test_skill_documents_cf_api_token_contract."
  phase2_target_datastore: "verified 2026-07-06 -- bpg/proxmox v0.111.x's proxmox_cloned_vm requires an explicit clone.target_datastore = data1 on this host (the source VMID 900's disk lives on data1); without the explicit pin, plan stores local-lvm while the cloned VM lands on data1, triggering 'Provider produced inconsistent result after apply'. Pinned by test_skill_documents_target_datastore_fix."
  phase2_path_module_double_dot: "verified 2026-07-06 -- After the 2026-07-05 file-layout refactor (module moved from clusters/<name>/modules/... to infra/modules/...), three module files were missed: outputs.tf (cluster_output.filename, talos_dir), traefik.tf (traefik_chartconfig.filename), talos.tf (talos_machineconfig.filename). Fix: path.module/../../clusters/<name>/... (two .. segments). Cluster root: data.local_file.image_id needs path.module/../../../build/image-id.txt (three .. segments). Pinned by test_skill_documents_path_module_double_dot_fix."
  state_backend_migration: "verified 2026-07-06 -- all 4 tofu stacks now store state in the GitLab HTTP backend at project infra-state/bigbertha (id 84156476): infra-tokens (10 resources, serial 1), proxmox-k3s-cluster-module (no state, module init only), cluster-cicd (15 resources, serial 1), cluster-apps (16 resources, serial 1). Pinned by 10 new tests in tools/tests/test_agent_skill.py (Step 0e lessons 0e.1 - 0e.8). Migration was zero-destroy: cicd plan shows 0 add / 5 change / 0 destroy (all in-place refreshes of terraform_data + proxmox_virtual_environment_hosts to align with new Sys.Modify privilege); apps shows 0 add / 2 change / 0 destroy. Helper script: scripts/gitlab_backend.sh (wraps tofu init with the right -backend-config= flags)."
  state_backend_helper: "verified 2026-07-06 -- scripts/gitlab_backend.sh init <stack-name> [--migrate-state] takes a stack name (one of infra-tokens, proxmox-k3s-cluster-module, cluster-cicd, cluster-apps) and runs `tofu -chdir=<dir> init -migrate-state -input=false -force-copy` with the right -backend-config= address/lock_address/unlock_address/username/password/lock_method/unlock_method/retry_wait_min flags. Password is supplied via GITLAB_ACCESS_TOKEN env var. The 'show' subcommand prints the flags without the password value (for auditing). Pinned by test_skill_documents_gitlab_backend_helper + test_gitlab_backend_helper_script_exists."
  state_backend_no_module_backend: "verified 2026-07-06 -- infra/modules/proxmox-k3s-cluster/versions.tf has NO `backend \"http\" {}` block. Per OpenTofu docs, a backend block in a module is silently ignored with a warning ('Any selected backend applies to the entire configuration, so OpenTofu expects provider configurations only in the root module'), and modules never carry state. State for instances of the module lives in the calling root (cluster-cicd, cluster-apps). Pinned by test_module_has_no_backend_block + test_skill_documents_module_no_backend."
