# WP04 follow-up (2026-07-08) — install_k3s phase on the cicd cluster.
# The control-plane node cicd-cp-1 (VMID 112, SDN 10.0.0.65) will run
# the k3s server with --tls-san=10.0.0.30 and the worker cicd-w-1
# (VMID 111, SDN 10.0.0.64) will join via https://10.0.0.30:6443.
#
# The k3s version pin is sourced from tools/versions.lock.yaml::
# k3s_stable_version. This file mirrors it for visibility next to the
# per-cluster identity values (versions follow the apps file's shape
# for symmetry; tests assert that this file exists and references the
# same pinned version).

inherit:
  k3s_stable_version_from: "../../../tools/versions.lock.yaml"

cluster_specific:
  cluster_name: "cicd"
  vip: "10.0.0.30"

install_k3s:
  k3s_stable_version: "v1.34.9+k3s1"
  vip: "10.0.0.30"
  control_plane:
    name: "cicd-cp-1"
    vmid: 112
    ip: "10.0.0.65"
  worker:
    name: "cicd-w-1"
    vmid: 111
    ip: "10.0.0.64"
  source: "tools/versions.lock.yaml::k3s_stable_version"

cross_check:
  cicd_install_k3s_2026_07_08: >
    cicd-cp-1 (VMID 112 @ SDN 10.0.0.65) installed k3s v1.34.9+k3s1
    server successfully; `systemctl is-active k3s` -> active;
    `/etc/rancher/k3s/k3s.yaml` present; listening on :6443 and
    :10250. cicd-w-1 (VMID 111 @ 10.0.0.64) installed k3s-agent;
    systemd unit is `activating` while waiting for kube-vip;
    `/etc/systemd/system/k3s-agent.service.env` correctly holds
    K3S_URL=https://10.0.0.30:6443 and the per-cluster node-token.
    The agent will register once the helm phase brings up
    kube-vip on the cicd cluster.

  cicd_helm_recovery_2026_07_08: >
    The original `python -m tools.bootstrap_cluster --cluster cicd
    --phases helm,k3s,kubeconfig,host_ports` invocation failed at the
    very first sub-step (`_run_helm` scp's `/etc/rancher/k3s/k3s.yaml`
    as `root@<cp_ip>` with no ProxyCommand -- the cloud image refuses
    root login, and the SDN IP isn't routable from the operator host).
    The `helm` sub-phase was therefore never executed, leaving the
    cluster in: cicd-cp-1 NotReady (NetworkPluginNotReady -- no CNI
    because we run with --flannel-backend=none), cicd-w-1 absent from
    `kubectl get nodes` (agent's K3S_URL=https://10.0.0.30:6443 hits a
    VIP that nothing owns, so the supervisor apiserver proxy returns
    "connection reset by peer" forever).

    Recovery (manual, using the operator tooling that DOES use the
    right ProxyCommand + ubuntu user):

      kubeconfig-puller --cluster cicd --local-port 6443
      # tunnel up on 127.0.0.1:6443, kubeconfig written to
      # infra/clusters/cicd/kubeconfig.pveproxy (gitignored)
      export KUBECONFIG=infra/clusters/cicd/kubeconfig.pveproxy
      helm repo add cilium https://helm.cilium.io/
      helm repo add kube-vip https://kube-vip.github.io/helm-charts
      helm install cilium cilium/cilium --version 1.16.1 \
        --namespace kube-system --set kubeProxyReplacement=true \
        --set gatewayAPI.enabled=true --set ipv4NativeRoutingCIDR=10.0.0.0/8 \
        --set ipam.mode=cluster-pool \
        --set ipam.operator.clusterPoolIPv4PodCIDRList=10.42.0.0/16 \
        --set hubble.enabled=false
      helm install kube-vip kube-vip/kube-vip --version 0.9.9 \
        --namespace kube-system --set config.address=10.0.0.30 \
        --set env.cp_enable=true --set env.vip_interface=eth0 \
        --set env.vip_arp=true --set env.vip_leaderelection=true \
        --set env.lb_enable=true --set env.lb_port=6443 \
        --set env.svc_enable=true --set env.svc_election=false

    After ~75s both nodes are Ready. NOTE: the chart values
    in tools/lib/helm_client.py are STALE -- they pin kube-vip
    1.2.1 (does not exist; latest is 0.9.9) and the wrong values
    shape (`controlPlane.enabled` vs the chart's `env.cp_enable`).
    The bootstrap script's helm sub-phase would fail at install
    time even if it could reach the SDN.

    Open work: (a) fix _run_helm + kubeconfig_merger to use
    PveSshProxy (so the script can be re-run, not just
    manually recovered); (b) refresh the chart versions and values
    shape in tools/lib/helm_client.py to match the upstream repos.

