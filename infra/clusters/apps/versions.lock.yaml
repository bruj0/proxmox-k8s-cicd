# WP03 (apps cluster instance / SS2) — added 2026-07-05.
# Inherits all provider and chart versions from WP02's lock file.
# This file exists to document the apps-specific identity values that
# MUST be globally unique across all cluster instances (M3 invariant).
#
# The seven-element uniqueness contract (see docs/cluster-instances.md):
#   1. cluster_name
#   2. vip           -- legacy PowerDNS alias, retained for audit
#   3. vmid_start    (4-gate buffer away from any existing cluster's range)
#   4. ip_start      (distinct /24 — cidrhost treats the IP portion as the network)
#   5. pod_cidr
#   6. svc_cidr
#   7. cf_tunnel_name
#
# WP08 (2026-07-08): pod_cidr/svc_cidr updated to non-host-LAN-overlapping
# RFC1918 ranges (172.20/172.21); cicd uses 172.16/172.17. The 3-step gap
# between the two clusters makes tcpdumps visually distinguishable.

dependencies:
  inherits_from: "../../modules/proxmox-k3s-cluster/versions.lock.yaml"

cluster_specific:
  cluster_name: "apps"
  # WP08: legacy VIP record kept for PowerDNS backwards compat.
  # No kube-vip DaemonSet listens on this address; the apiserver
  # is on the CP host IP below.
  vip: "10.0.0.40"
  vmid_start: 210
  ip_start: "10.0.1.0/24"
  pod_cidr: "172.20.0.0/16"
  svc_cidr: "172.21.0.0/16"
  cf_tunnel_name: "apps"

collision_check:
  cicd_vip: "10.0.0.30"            # apps MUST differ
  cicd_vmid_start: 200             # apps MUST be >= 204 (4-gate buffer)
  cicd_ip_start: "10.0.0.0/24"     # apps MUST be a different /24
  cicd_pod_cidr: "172.16.0.0/16"  # apps MUST differ (WP08)
  cicd_svc_cidr: "172.17.0.0/16"  # apps MUST differ (WP08)
  cicd_cf_tunnel_name: "cicd"      # apps MUST differ
  status: "VERIFIED — apps uses values disjoint from cicd on all 6 axes (WP08: pod/svc cidrs bumped to 172.20/172.21)"

# WP04 follow-up (2026-07-08) — install_k3s phase on the apps cluster.
# The control-plane node apps-cp-1 (VMID 210, SDN 10.0.0.67) runs the
# k3s server with --tls-san=10.0.0.67 and the worker apps-w-1 (VMID 211,
# SDN 10.0.0.66) joins via https://10.0.0.67:6443. WP08: --tls-san=<vip>
# replaced with --tls-san=<cp_ip>; the legacy `vip` is retained below
# for backwards-compat with the historical PowerDNS records.
install_k3s:
  k3s_stable_version: "v1.36.2+k3s1"
  vip: "10.0.0.40"  # legacy
  control_plane:
    name: "apps-cp-1"
    vmid: 210
    # WP08: agents and external clients join on this IP.
    ip: "10.0.0.67"
  worker:
    name: "apps-w-1"
    vmid: 211
    ip: "10.0.0.66"
  source: "tools/versions.lock.yaml::k3s_stable_version"

# WP08 (2026-07-08): non-overlapping RFC1918 CIDRs. k3s defaults
# (10.42/10.43) overlap the host LAN 10.0.0.0/8 and trigger the
# pod->apiserver MASQUERADE short-circuit documented in
# k3s-io/k3s#4627.
network:
  pod_cidr: "172.20.0.0/16"
  svc_cidr: "172.21.0.0/16"
  cluster_dns: "172.21.0.10"

# WP08 (2026-07-08): all six required Helm releases are healthy.
helm_releases:
  cilium:
    chart: "cilium/cilium"
    version: "1.16.1"
    notes: >
      Single CNI release; kubeProxyReplacement=true; no IPv4 native
      routing CIDR override. cgroup.hostRoot=/sys/fs/cgroup +
      cgroup.autoMount.enabled=false. k8sServiceHost=10.0.0.67.
      mtu=1450 for vxlan. gatewayAPI enabled for the apps cluster's
      Envoy Gateway (apps is the only cluster that exposes public
      HTTPS via cloudflare-tunnel).
  proxmox-cloud-controller-manager:
    chart: "sergelogvinov/proxmox-cloud-controller-manager"
    version: "0.2.29"
    notes: >
      URL pinned to https://10.0.0.1:8006/api2/json with
      insecure_skip_tls_verify=true. region=proxmox-host,
      zone=BigBertha.
  proxmox-csi-plugin:
    chart: "sergelogvinov/proxmox-csi-plugin"
    version: "0.5.9"
    notes: >
      Storage class 'data1' (lvm-thin). Topology labels required
      on every node; without them csi-plugin-node CrashLoopBackOffs.
  cert-manager:
    chart: "cert-manager/cert-manager"
    version: "v1.16.x"
    notes: "In-cluster CA only; no public ACME (NFR-007)."
  cloudflare-tunnel-ingress-controller:
    chart: "oci://ghcr.io/strrl/charts/cloudflare-tunnel-ingress-controller"
    version: "0.0.23"
    notes: "Public HTTPS ingress for apps cluster only (cf_tunnel_name=apps)."
  envoy-gateway:
    chart: "oci://docker.io/envoyproxy/gateway-helm"
    version: "v1.2.x"
    notes: "Gateway API implementation; CRDs pinned at v1.6.0 standard channel."

# WP06 (cross-cluster Services wiring) -- added 2026-07-05.
# This block records the dependency versions for the cross-cluster
# wiring between the apps and cicd clusters. The wiring is rendered
# into `clusters/apps/manifests/cicd-system/` and applied by SS3
# (bootstrap_cluster.py --cluster apps --phases externalname).
cross_cluster_dependencies:
  - name: kubernetes-external-name
    version: "stable (core API since k8s 1.0)"
    rationale: "ExternalName Service is core k8s; no compat risk against k3s 1.36."
    source: "context7-auto-research on 2026-07-08"
  - name: kustomize
    version: ">= 5.x"
    rationale: "kustomization.yaml uses v1beta1 schema which is the kustomize 5.x default."
    source: "context7-auto-research on 2026-07-05"
  - name: kubectl
    version: "matches k3s minor (1.36)"
    rationale: "`kubectl apply -k` is stable across all kubectl versions that ship with k3s 1.36.x."
    source: "context7-auto-research on 2026-07-08"

cross_check:
  externalname_coredns: "compatible (ExternalName resolves via apps CoreDNS which forwards to host resolv.conf -> 10.0.0.3 PowerDNS)"
  kustomize_manifests: "v1beta1-compatible (kustomize 5.x renders the v1beta1 schema without warnings)"
  nameservers_upstream: "apps cluster inherits 10.0.0.3 (PowerDNS) as upstream nameserver via host /etc/resolv.conf (FR-034)"
  apps_install_k3s_2026_07_08: >
    apps-cp-1 (VMID 210 @ SDN 10.0.0.67) installs k3s v1.36.2+k3s1
    server with --cluster-cidr=172.20.0.0/16 --service-cidr=172.21.0.0/16
    --cluster-dns=172.21.0.10 --tls-san=10.0.0.67,172.21.0.1,kubernetes.default.svc
    --disable-kube-proxy (cilium owns ClusterIP routing). apps-w-1
    (VMID 211 @ 10.0.0.66) joins via K3S_URL=https://10.0.0.67:6443.
    Idempotent: re-running the install_k3s phase short-circuits on
    systemctl is-active k3s + /etc/rancher/k3s/k3s.yaml.

  apps_bootstrap_complete_2026_07_08: >
    All six helm releases installed. Cilium 1/1 + cilium-operator 1/1
    on every node. coredns 1/1. proxmox-ccm 1/1 (providerID +
    topology.kubernetes.io/{region,zone}=proxmox-host/BigBertha).
    proxmox-csi-plugin controller 5/5 + node DaemonSet 3/3 on every
    node. cert-manager + cloudflare-tunnel-ingress-controller +
    envoy-gateway all Running. End-to-end smoke:
    `kubectl get nodes` shows apps-cp-1, apps-w-1 Ready; PVC/PV
    binding works against StorageClass=data1.

  apps_topology_labels_2026_07_08: >
    WP08 follow-up: BigBertha is single-node PVE (no corosync
    cluster), so proxmox-ccm does NOT auto-apply the
    topology.kubernetes.io/{region,zone} labels. The chart was
    updated to set them via chart values (region=proxmox-host,
    zone=BigBertha) AND a one-shot post-install verification
    confirmed both nodes carry the labels -- without them,
    proxmox-csi-plugin-node CrashLoopBackOffs with "Failed to get
    region or zone for node" and stays unready forever.