dependencies:
  - name: cloudflare/cloudflare
    version: ">= 4.0"
    source: "context7-auto-research on 2026-07-05"
    rationale: >
      Stable. v5.x is the current stable release; the spec floor is v4.0.
      The v5 provider exposes the cloudflare_account_api_token_permission_groups_list
      data source we use to resolve permission group IDs at plan time (no
      hard-coded UUIDs). v4.x is the lower bound the spec mandates for
      forward-compat with downstream WPs.
  - name: bpg/proxmox
    version: ">= 0.111.1"
    source: "context7-auto-research on 2026-07-05"
    rationale: >
      Stable. v0.111.1 is the spec-mandated minimum; it ships the
      proxmox_virtual_environment_role / proxmox_virtual_environment_user
      resource types and the short-form proxmox_acl / proxmox_user_token
      aliases. The latter are still under deprecation (planned for removal
      in v1.0), but they're the v0.111.x-canonical names.
  - name: hashicorp/local
    version: ">= 2.0"
    source: "spec T000 + local provider docs"
    rationale: >
      Stable. Required for the local_file resource that writes output.json
      with chmod 0600 (spec T007). v2.0 introduced sensitive_content which
      is the attribute we use to redact secret values from `tofu plan` output.
  - name: hashicorp/http
    version: ">= 3.0"
    source: "context7-auto-research on 2026-07-05"
    rationale: >
      Stable. Used to look up the apply-runner public IP via ifconfig.me so
      the Cloudflare scoped token is IP-locked. v3.x supports the
      request_headers attribute we use to ask for text/plain.

