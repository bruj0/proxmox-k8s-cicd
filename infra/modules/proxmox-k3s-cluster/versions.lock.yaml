# versions.lock.yaml — per-WP compatibility matrix for modules/proxmox-k3s-cluster.
#
# Authoritative source for version pins in this module. Mirrors versions.tf.
#
# Source: context7-auto-research on 2026-07-05.
dependencies:
  - name: bpg/proxmox
    version: ">= 0.111.1"
    rationale: >
      Spec T001-mandated minimum. The v0.111.1 release adds the
      `operating_system.type` attribute required for the l26 OS hint on the
      Talos clones, and fixes the `network_device.vlan_id` validation.
    source: "context7-auto-research on 2026-07-05"

  - name: hashicorp/helm
    version: ">= 2.0.0"
    rationale: >
      The v2 line is required for the `helm_release.manifest` attribute used
      for drift detection. The STRRL/cloudflare-tunnel-ingress-controller
      chart exposes a manifest field that we want to surface.
    source: "context7-auto-research on 2026-07-05"

  - name: hashicorp/local
    version: ">= 2.0.0"
    rationale: >
      The v2 line deprecates `local_file.sensitive_content` in favour of
      `local_sensitive_file` (api_discovery from WP00). The SS2->SS3 contract
      is `local_sensitive_file.cluster_output` with file_permission = "0600".
    source: "context7-auto-research on 2026-07-05"

  - name: strrl/cloudflare-tunnel-ingress-controller
    version: "0.0.23"
    rationale: >
      Pin to the spec-mandated Helm chart version. The chart lives at
      oci://ghcr.io/strrl/charts. Helm release is gated on
      var.cf_publish_traefik_publicly=true (off by default).
    source: "context7-auto-research on 2026-07-05"

  - name: cilium
    version: "1.16.x"
    rationale: >
      Matches versions.yaml::ubuntu::noble-24.04::cilium_max. WP04
      installs Cilium at this version; the Helm values SS3 renders
      must be compatible with Cilium 1.16.x (kubeProxyReplacement
      knob, BPF host routing, cgroup.hostRoot, gatewayAPI.enabled).
      WP08 (2026-07-08) added the cgroup.hostRoot pin and the
      k8sServiceHost=<cp_ip> override.
    source: "context7-auto-research on 2026-07-08"

  # WP08 (2026-07-08): kube-vip removed. Single-CP clusters don't
  # need a VIP layer; agents join on the CP host IP directly.
  # See infra/clusters/<name>/versions.lock.yaml for the new
  # apiserver endpoint contract.

  - name: traefik
    version: "v3.x (bundled with k3s)"
    rationale: >
      k3s bundles Traefik as a HelmChart; we don't pin a separate version, but
      the chartconfig template we render must be compatible with the v3 line
      (service.type=ClusterIP, ingressClass.name=traefik-internal).
    source: "context7-auto-research on 2026-07-05"

  - name: pan-net/powerdns
    version: ">= 1.5.0"
    rationale: >
      Authoritative DNS provider for the cluster on this host. PVE 9.x
      configures PowerDNS via /cluster/sdn/dns (pdns @ 10.0.0.3:8081, zone
      intranet.local., reverse zone 10.in-addr.arpa.). The bpg provider's
      `proxmox_virtual_environment_hosts` resource writes to PVE's local
      hosts file -- which PowerDNS overrides -- so it was a no-op that
      produced persistent drift on every plan. pan-net/powerdns creates the
      cluster A + PTR records directly so tofu state matches what resolvers
      actually answer.
    source: "live-host discovery 2026-07-06 (PowerDNS at 10.0.0.3:8081, key in /etc/pve/sdn/dns.cfg)"