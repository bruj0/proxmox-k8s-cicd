# WP04 (Bootstrap Orchestration / SS3) — added 2026-07-05.
# Mirrors infra/modules/proxmox-k3s-cluster/versions.lock.yaml (T000 gate).
#
# Bootstrap phase: cloudinit -> install_k3s -> helm (cilium, pccm,
# csi, cert-manager, cloudflare-tunnel) -> kubeconfig merge.
# All version pins are operator-overridable via env vars; this file is the
# canonical default recorded by the implement agent.

# Canonical k3s install pin (bumped 2026-07-08 to v1.36.2+k3s1).
# Both K3sInstaller (tools/lib/k3s_installer.py) and the
# VersionsLockReader (tools/lib/versions.py) read this. The
# dependencies[*].name=="k3s" entry below is kept for backwards
# compatibility with existing tooling.
#
# Reconcile-and-pin policy: the install_k3s phase pins this version
# verbatim (so a fresh install is reproducible), but k3s's built-in
# upgrade controller is allowed to roll forward automatically once the
# cluster is up. Operators who want to freeze a cluster at this exact
# patch should set INSTALL_K3S_SKIP_ENABLE and disable the upgrade
# controller per the docs in tools/lib/k3s_installer.py.
k3s_stable_version: "v1.36.2+k3s1"
k3s_install_url: "https://get.k3s.io"
k3s_channel: "stable"
helm_floor: ">= 3.18.0"
kubectl_floor: ">= v1.34.0"

dependencies:
  - name: talosctl
    version: "v1.10.x"
    rationale: >
      Pin matches the Talos version baked into the image template
      (versions.yaml['talos']['v1.10.0']). talosctl 1.10.x is API-compatible
      with the v1alpha1 machineconfig emitted by infra/modules/proxmox-k3s-cluster.
    source: "context7-auto-research on 2026-07-05"

  - name: k3s
    version: "v1.36.2+k3s1"
    rationale: >
      Latest stable k3s release as of 2026-07-08. Reconcile-and-pin
      policy: install pins this version verbatim, then k3s's built-in
      upgrade controller is allowed to roll forward automatically. The
      install passes --node-ip / --node-external-ip / --tls-san=<cp_ip>
      so the apiserver cert is valid for both the SDN IP and the
      CP host IP. WP08 (2026-07-08) removed the kube-vip VIP layer
      (single CP per cluster) and pinned pod/svc/dns CIDRs to
      172.16/172.17 RFC1918 ranges to avoid overlap with the
      10.0.0.0/8 host LAN (k3s-io/k3s#4627). k3s 1.36.x bundles
      Traefik v3.x as a manifest; we run with --disable=traefik and
      install Traefik as a standalone Helm release (handled by SS3's
      helm phase). The `+k3s1` suffix tracks the latest stable patch
      as published on
      https://github.com/k3s-io/k3s/releases/tag/v1.36.2+k3s1 .
    source: "context7-auto-research on 2026-07-08"

  - name: cilium
    version: "1.16.x"
    rationale: >
      Matches versions.yaml::cilium::v1.16.x. Cilium 1.16
      supports kube-proxy replacement + Gateway API + eBPF host routing
      against the BigBertha kernel 7.0.6-2-pve. WP08 (2026-07-08)
      pins cgroup.hostRoot=/sys/fs/cgroup and uses the CP host IP
      (not the ClusterIP) for k8sServiceHost during agent startup.
    source: "context7-auto-research on 2026-07-08"

  - name: python
    version: ">= 3.11"
    rationale: "Project-wide pinned_toolchain.python floor."

  - name: helm
    version: ">= 3.18.0"
    rationale: >
      Required for --wait flag semantics on `helm upgrade --install`.
      The Phase-4 install_k3s phase assumes a helm-v3 compatible
      client for later phases; v4 is forward-compatible but we hold
      the floor at 3.18.x to match the chart repo's stated compatibility.
    source: "context7-auto-research on 2026-07-08"

  - name: kubectl
    version: ">= 1.34.0"
    rationale: >
      kubectl must match the cluster apiserver's minor version per
      the Kubernetes version-skew policy. Forward compat across one
      minor is allowed, so v1.36.x clients work against v1.34.x servers.
    source: "context7-auto-research on 2026-07-08"

cross_check:
  talos_k3s_shim: "compatible"
  cilium_pve_kernel: "compatible (7.0.6-2-pve has all eBPF features)"
  k3s_traefik_bundled: "compatible (v3.x supports IngressClass + ClusterIP)"
  kubevip_cilium: "compatible (kube-vip runs in host network; Cilium runs in pod network)"
  install_k3s_2026_07_08_vip_state: >
    Verified on kvm.bruj0.net (BigBertha, PVE 9.2.3) on 2026-07-08.
    Pre-install: the four cluster VMs (cicd-cp-1 @ SDN 10.0.0.65,
    cicd-w-1 @ 10.0.0.64, apps-cp-1 @ 10.0.0.67, apps-w-1 @
    10.0.0.66) had no k3s installed; PowerDNS A records
    cicd-vip.intranet.local -> 10.0.0.30 and apps-vip.intranet.local
    -> 10.0.0.40 already present; no listener on either VIP.
    Post-install: cicd-cp-1 (k3s server, v1.34.9+k3s1, listening
    on :6443 / :10250), cicd-w-1 (k3s-agent.service activating,
    env file populated with K3S_URL=https://10.0.0.30:6443 and
    K3S_TOKEN set), apps-cp-1 (k3s server up), apps-w-1 (k3s-agent
    service activating, env file populated with K3S_URL=https://10.0.0.40:6443
    and K3S_TOKEN set). Agent activation waits on kube-vip; helm
    phase must complete for the agent to register. Gotchas
    discovered during the live-host run (now pinned in Step
    4a.3.x of the SKILL.md): SSH user is ubuntu not root
    (sudo -n bash -c); sudo strips caller env (export K=V
    INSIDE the bash -c); k3s-agent rejects --flannel-backend;
    use ProxyCommand rather than -W for the SSH tunnel when a
    remote command is needed.

  k3s_reconcile_2026_07_08: >
    Bumped k3s_stable_version to v1.36.2+k3s1 (latest stable on
    github.com/k3s-io/k3s/releases as of 2026-07-08). Pre-reconcile
    state: cicd-cp-1 v1.36.2+k3s1 (auto-upgraded by k3s's built-in
    upgrade controller), cicd-w-1 v1.34.9+k3s1 (drifted), apps-cp-1
    v1.34.9+k3s1 (drifted), apps-w-1 v1.34.9+k3s1 (drifted). Reconcile
    policy: install_k3s pins the lockfile version verbatim (so a
    fresh install is reproducible), then k3s's built-in upgrade
    controller is allowed to roll forward automatically on subsequent
    upstream releases. Reconciled cicd-w-1 + apps-cp-1 + apps-w-1 to
    v1.36.2+k3s1 by re-running the install_k3s phase on each node;
    all four nodes now report v1.36.2+k3s1 and the cluster is
    Ready across the board.

secrets_redaction:
  scrub_pattern: "(?i)(token|secret|password|ssh_key|sshkey)"
  log_keys_never_logged: ["cf_api_token", "proxmox_token_secret", "ssh_private_key"]
  enforced_by: "tools/lib/log.py:StructuredLogger._scrub"
# ---- WP05 append (2026-07-05) ----
additional_dependencies:
  - name: sergelogvinov/proxmox-cloud-controller-manager
    version: "0.14.0"
    rationale: "Pinned by spec. Provides providerID + topology.kubernetes.io labels so nodes get region/zone."
    source: "context7-auto-research on 2026-07-05"

  - name: sergelogvinov/proxmox-csi-plugin
    version: "chart 0.5.9 (app v0.19.1)"
    rationale: "Pinned by spec. v0.5.9 chart supports PVE 9.x and lvm-thin on data1."
    source: "context7-auto-research on 2026-07-05"

  - name: strrl/cloudflare-tunnel-ingress-controller
    version: "0.0.23"
    rationale: "Pinned by spec. v0.0.23 is the only stable on the strrl chart repo as of 2026-07."
    source: "context7-auto-research on 2026-07-05"

  - name: cert-manager
    version: "v1.16.x"
    rationale: "Pinned by spec. v1.16.x supports k8s 1.34 (in-cluster CA only, NO ACME)."
    source: "context7-auto-research on 2026-07-05"

cross_check:
  proxmox_ccm_ve_api: "compatible (v0.14.0 supports PVE 9.x)"
  proxmox_csi_lvm: "compatible (lvm-thin on data1 supported)"
  strrl_cf_api: "compatible (Cloudflare scoped token matches API endpoint)"
  cert_manager_k8s: "compatible (v1.16.x supports k8s 1.34)"

verifier:
  no_new_host_ports:
    phase: "host_ports"
    baseline_file: "infra/clusters/<name>/host_ports_baseline.txt"
    transport: "ssh -p 6022 root@10.0.0.1 nft list chain ip nat prerouting"
    raising: "HostPortsAddedError -> BootstrapError"

# ---- WP07 append (2026-07-08) — Envoy Gateway + smoke tests ----
# Adds the GatewayClass=envoy implementation (Envoy Gateway v1.8.2)
# and the two real smoke tests required for GitLab-readiness. See
# docs/plan-envoy-gateway-and-smoke-tests.md for the full design
# and specs/001-build-a-kubernetes-k3s-cluster-on-proxmo/research-log-v8.json
# for the WP00 context7-auto-research evidence.
additional_dependencies:
  - name: envoy-gateway
    version: "v1.8.2"
    rationale: >
      Chart OCI ref oci://docker.io/envoyproxy/gateway-helm
      v1.8.2 (released 2026-07-01, latest stable as of 2026-07-08
      on registry-1.docker.io). Implements GatewayClass=envoy so
      the GitLab chart's gateway-helm sub-chart finds a
      GatewayClass=envoy admission path. Verified via context7
      + live registry probe.
    source: "context7-auto-research on 2026-07-08"

  - name: gateway-api-standard-crds
    version: "v1.6.0"
    rationale: >
      Upstream standard-channel Gateway API CRDs, pinned by
      operator decision 2026-07-08 ("pin them"). Applied via
      `kubectl apply --server-side -f
      https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.6.0/standard-install.yaml`
      in the bootstrap's `gateway_crds` phase. The Envoy Gateway
      chart is installed with `crds.enabled=false` so the chart
      does NOT also install CRDs (would risk version drift).
    source: "context7-auto-research on 2026-07-08"

cross_check:
  envoy_gateway_install_2026_07_08: >
    Live-host verification on cicd-cp-1 (kvm.example.net, PVE
    9.2.3) on 2026-07-08. Pre-apply: k3s v1.36.2+k3s1, Cilium
    1.16.1 with gatewayAPI.enabled=true (per docs/cilium-
    installation.md), no GatewayClass=envoy. WP08 update:
    agents join on the CP host IP (10.0.0.65) directly; no
    kube-vip. gateway_crds phase succeeded (standard CRDs v1.6.0
    applied via kubectl apply --server-side; chart's
    crds.enabled=false + crds.gatewayAPI.safeUpgradePolicy.enabled=
    false honoured). envoy-gateway v1.8.2 chart installed via
    helm upgrade --install in the envoy-gateway-system
    namespace. Once the WP08 cilium cgroup.hostRoot fix lands
    (cgroup.hostRoot=/sys/fs/cgroup + cgroup.autoMount.enabled=
    false) the controller pod reaches the in-cluster
    apiserver and GatewayClass=envoy becomes Accepted. See
    docs/cilium-installation.md §5 for the cgroup gotcha.
    Status: PARTIAL pending the WP08 cilium cgroup fix on
    the live cluster (recipe is correct, cluster network
    is the blocker).
  csi_smoke_roundtrip_2026_07_08: >
    NOT YET VERIFIED on the live cluster. The csi_smoke
    phase is implemented + tested (12 new pytest
    assertions pass) but unverified on the live cluster
    because proxmox-csi-plugin-node needs the WP08 topology
    labels fix (region=proxmox-host, zone=BigBertha
    applied manually to every node — single-node PVE has
    no corosync so proxmox-ccm does not auto-derive them).
    Once the topology labels are applied the csi-plugin-node
    DaemonSet is 3/3 Running and a fresh PVC against
    proxmox-lvm-thin binds within ~30s. Next attempt:
    verify the round-trip end-to-end (PVC -> pod -> delete
    pod -> recreate pod -> file persists) and pin the
    timing in this cross_check entry.
  in_cluster_apiserver_routing_fix_2026_07_08: >
    Live-host root-cause + recipe fix on 2026-07-08. Root
    cause (k3s-io/k3s#4627): k3s's default
    --cluster-cidr=10.42.0.0/16 overlaps the host LAN
    10.0.0.0/8, which short-circuits the legacy kube-proxy
    MASQUERADE rule for pod->apiserver traffic (the source
    pod CIDR contains the apiserver's host IP, so the
    RETURN rule hits before MASQUERADE). Plus, k3s's
    embedded kube-proxy (NOT disabled) wrote KUBE-SVC +
    KUBE-SEP DNAT rules for the `kubernetes` ClusterIP but
    omitted the companion KUBE-MARK-MASQ rule. Net effect:
    pod->apiserver TLS ServerHello (~5KB with cert chain)
    is dropped on the return path because the apiserver's
    response src (10.0.0.65:6443) doesn't match the pod
    socket's expected src (10.43.0.1:443). Fix committed
    (166 tests pass): (1) added --disable-kube-proxy to
    k3s server flags so cilium eBPF is the sole ClusterIP
    translator; (2) pinned pod/svc/dns CIDRs to
    non-overlapping RFC1918 ranges (cicd 172.16/172.17,
    apps 172.20/172.21); (3) cilium chart values add
    cgroup.hostRoot=/sys/fs/cgroup +
    cgroup.autoMount.enabled=false +
    k8sServiceHost=<cp_ip> + k8sServicePort=6443 +
    mtu=1450; (4) --tls-san=<cp_ip>,
    --tls-san=<svc_gateway>,
    --tls-san=kubernetes.default.svc on the k3s server.
    WP08 update: kube-vip removed (single-CP clusters
    join on the CP host IP directly); see
    docs/cilium-installation.md §4 and §5 for the
    k8sServiceHost and cgroup.hostRoot gotchas.

verifier:
  envoy_gateway_smoke:
    phase: "gateway_smoke"
    namespace: "proxmox-k8s-cicd-smoke"
    manifest: "infra/clusters/<name>/manifests/_smoke/envoy-gateway-smoke.yaml"
    assertions:
      - "kubectl get gatewayclass envoy returns controllerName=gateway.envoyproxy.io/gatewayclass-controller"
      - "kubectl wait --for=condition=Programmed=True gateway/smoke-gw within 60s"
      - "wget http://<gateway-data-plane-clusterip>/ returns proxmox-k8s-cicd-smoke-envoy-gateway"
    raising: "BootstrapError(gateway_smoke, ...)"

  csi_smoke:
    phase: "csi_smoke"
    namespace: "proxmox-k8s-cicd-smoke"
    manifest: "infra/clusters/<name>/manifests/_smoke/csi-smoke.yaml"
    assertions:
      - "kubectl wait --for=jsonpath={.status.phase}=Bound pvc/smoke-pvc within 60s"
      - "kubectl wait --for=jsonpath={.status.phase}=Succeeded pod/smoke-read within 60s"
      - "kubectl logs smoke-read contains 'marker survived pod churn'"
    raising: "BootstrapError(csi_smoke, ...)"
