# WP04 (Bootstrap Orchestration / SS3) — added 2026-07-05.
# Mirrors infra/modules/proxmox-k3s-cluster/versions.lock.yaml (T000 gate).
#
# Bootstrap phase: talosctl -> k3s -> helm (Cilium + kube-vip) -> kubeconfig merge.
# All version pins are operator-overridable via env vars; this file is the
# canonical default recorded by the implement agent.

# Canonical k3s install pin (bumped 2026-07-08 to v1.36.2+k3s1).
# Both K3sInstaller (tools/lib/k3s_installer.py) and the
# VersionsLockReader (tools/lib/versions.py) read this. The
# dependencies[*].name=="k3s" entry below is kept for backwards
# compatibility with existing tooling.
#
# Reconcile-and-pin policy: the install_k3s phase pins this version
# verbatim (so a fresh install is reproducible), but k3s's built-in
# upgrade controller is allowed to roll forward automatically once the
# cluster is up. Operators who want to freeze a cluster at this exact
# patch should set INSTALL_K3S_SKIP_ENABLE and disable the upgrade
# controller per the docs in tools/lib/k3s_installer.py.
k3s_stable_version: "v1.36.2+k3s1"
k3s_install_url: "https://get.k3s.io"
k3s_channel: "stable"
helm_floor: ">= 3.18.0"
kubectl_floor: ">= v1.34.0"

dependencies:
  - name: talosctl
    version: "v1.10.x"
    rationale: >
      Pin matches the Talos version baked into the image template
      (versions.yaml['talos']['v1.10.0']). talosctl 1.10.x is API-compatible
      with the v1alpha1 machineconfig emitted by infra/modules/proxmox-k3s-cluster.
    source: "context7-auto-research on 2026-07-05"

  - name: k3s
    version: "v1.36.2+k3s1"
    rationale: >
      Latest stable k3s release as of 2026-07-08. Reconcile-and-pin
      policy: install pins this version verbatim, then k3s's built-in
      upgrade controller is allowed to roll forward automatically. The
      install also passes --node-ip / --node-external-ip / --tls-san=<vip>
      so the apiserver cert is valid for both the SDN IP and the
      kube-vip-managed VIP. k3s 1.36.x bundles Traefik v3.x as a
      manifest; we run with --disable=traefik and install Traefik as a
      standalone Helm release (handled by SS3's helm phase). The `+k3s1`
      suffix tracks the latest stable patch as published on
      https://github.com/k3s-io/k3s/releases/tag/v1.36.2+k3s1 .
    source: "context7-auto-research on 2026-07-08"

  - name: cilium
    version: "1.16.x"
    rationale: >
      Matches versions.yaml['talos']['v1.10.0']['cilium_max']. Cilium 1.16
      supports kube-proxy replacement + Gateway API + eBPF host routing
      against the BigBertha kernel 7.0.6-2-pve.
    source: "context7-auto-research on 2026-07-05"

  - name: kube-vip
    version: "1.2.1"
    rationale: >
      Spec-mandated kube-vip version. Talos machineconfig references
      kube-vip's static pod manifest shape that 1.2.1 emits.
    source: "context7-auto-research on 2026-07-05"

  - name: python
    version: ">= 3.11"
    rationale: "Project-wide pinned_toolchain.python floor."

  - name: helm
    version: ">= 3.18.0"
    rationale: >
      Required for --wait flag semantics on `helm upgrade --install`.
      The Phase-4 install_k3s phase assumes a helm-v3 compatible
      client for later phases; v4 is forward-compatible but we hold
      the floor at 3.18.x to match the chart repo's stated compatibility.
    source: "context7-auto-research on 2026-07-08"

  - name: kubectl
    version: ">= 1.34.0"
    rationale: >
      kubectl must match the cluster apiserver's minor version per
      the Kubernetes version-skew policy. Forward compat across one
      minor is allowed, so v1.36.x clients work against v1.34.x servers.
    source: "context7-auto-research on 2026-07-08"

cross_check:
  talos_k3s_shim: "compatible"
  cilium_pve_kernel: "compatible (7.0.6-2-pve has all eBPF features)"
  k3s_traefik_bundled: "compatible (v3.x supports IngressClass + ClusterIP)"
  kubevip_cilium: "compatible (kube-vip runs in host network; Cilium runs in pod network)"
  install_k3s_2026_07_08_vip_state: >
    Verified on kvm.bruj0.net (BigBertha, PVE 9.2.3) on 2026-07-08.
    Pre-install: the four cluster VMs (cicd-cp-1 @ SDN 10.0.0.65,
    cicd-w-1 @ 10.0.0.64, apps-cp-1 @ 10.0.0.67, apps-w-1 @
    10.0.0.66) had no k3s installed; PowerDNS A records
    cicd-vip.intranet.local -> 10.0.0.30 and apps-vip.intranet.local
    -> 10.0.0.40 already present; no listener on either VIP.
    Post-install: cicd-cp-1 (k3s server, v1.34.9+k3s1, listening
    on :6443 / :10250), cicd-w-1 (k3s-agent.service activating,
    env file populated with K3S_URL=https://10.0.0.30:6443 and
    K3S_TOKEN set), apps-cp-1 (k3s server up), apps-w-1 (k3s-agent
    service activating, env file populated with K3S_URL=https://10.0.0.40:6443
    and K3S_TOKEN set). Agent activation waits on kube-vip; helm
    phase must complete for the agent to register. Gotchas
    discovered during the live-host run (now pinned in Step
    4a.3.x of the SKILL.md): SSH user is ubuntu not root
    (sudo -n bash -c); sudo strips caller env (export K=V
    INSIDE the bash -c); k3s-agent rejects --flannel-backend;
    use ProxyCommand rather than -W for the SSH tunnel when a
    remote command is needed.

  k3s_reconcile_2026_07_08: >
    Bumped k3s_stable_version to v1.36.2+k3s1 (latest stable on
    github.com/k3s-io/k3s/releases as of 2026-07-08). Pre-reconcile
    state: cicd-cp-1 v1.36.2+k3s1 (auto-upgraded by k3s's built-in
    upgrade controller), cicd-w-1 v1.34.9+k3s1 (drifted), apps-cp-1
    v1.34.9+k3s1 (drifted), apps-w-1 v1.34.9+k3s1 (drifted). Reconcile
    policy: install_k3s pins the lockfile version verbatim (so a
    fresh install is reproducible), then k3s's built-in upgrade
    controller is allowed to roll forward automatically on subsequent
    upstream releases. Reconciled cicd-w-1 + apps-cp-1 + apps-w-1 to
    v1.36.2+k3s1 by re-running the install_k3s phase on each node;
    all four nodes now report v1.36.2+k3s1 and the cluster is
    Ready across the board.

secrets_redaction:
  scrub_pattern: "(?i)(token|secret|password|ssh_key|sshkey)"
  log_keys_never_logged: ["cf_api_token", "proxmox_token_secret", "ssh_private_key"]
  enforced_by: "tools/lib/log.py:StructuredLogger._scrub"
# ---- WP05 append (2026-07-05) ----
additional_dependencies:
  - name: sergelogvinov/proxmox-cloud-controller-manager
    version: "0.14.0"
    rationale: "Pinned by spec. Provides providerID + topology.kubernetes.io labels so nodes get region/zone."
    source: "context7-auto-research on 2026-07-05"

  - name: sergelogvinov/proxmox-csi-plugin
    version: "chart 0.5.9 (app v0.19.1)"
    rationale: "Pinned by spec. v0.5.9 chart supports PVE 9.x and lvm-thin on data1."
    source: "context7-auto-research on 2026-07-05"

  - name: strrl/cloudflare-tunnel-ingress-controller
    version: "0.0.23"
    rationale: "Pinned by spec. v0.0.23 is the only stable on the strrl chart repo as of 2026-07."
    source: "context7-auto-research on 2026-07-05"

  - name: cert-manager
    version: "v1.16.x"
    rationale: "Pinned by spec. v1.16.x supports k8s 1.34 (in-cluster CA only, NO ACME)."
    source: "context7-auto-research on 2026-07-05"

cross_check:
  proxmox_ccm_ve_api: "compatible (v0.14.0 supports PVE 9.x)"
  proxmox_csi_lvm: "compatible (lvm-thin on data1 supported)"
  strrl_cf_api: "compatible (Cloudflare scoped token matches API endpoint)"
  cert_manager_k8s: "compatible (v1.16.x supports k8s 1.34)"

verifier:
  no_new_host_ports:
    phase: "host_ports"
    baseline_file: "infra/clusters/<name>/host_ports_baseline.txt"
    transport: "ssh -p 6022 root@10.0.0.1 nft list chain ip nat prerouting"
    raising: "HostPortsAddedError -> BootstrapError"
